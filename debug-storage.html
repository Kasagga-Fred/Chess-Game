<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug Storage - Chess Game</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background: #1a1a1a;
      color: #d4af37;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 { color: #f0c040; }
    .section {
      background: #2a2a2a;
      border: 2px solid #d4af37;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
    }
    pre {
      background: #000;
      padding: 15px;
      border-radius: 4px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    button {
      background: #d4af37;
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }
    button:hover {
      background: #f0c040;
    }
    .danger {
      background: #dc1e1e;
      color: #fff;
    }
    .danger:hover {
      background: #ff4444;
    }
    .status {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
    }
    .success { background: rgba(0, 255, 0, 0.1); border: 1px solid #0f0; }
    .error { background: rgba(255, 0, 0, 0.1); border: 1px solid #f00; }
    .info { background: rgba(212, 175, 55, 0.1); border: 1px solid #d4af37; }
  </style>
</head>
<body>
  <h1>🔍 Chess Game Storage Debug Tool</h1>

  <div class="section">
    <h2>📊 Storage Status</h2>
    <div id="status"></div>
    <button onclick="checkStorage()">🔄 Refresh Status</button>
  </div>

  <div class="section">
    <h2>💾 Current Game Save</h2>
    <div id="current-game"></div>
    <button onclick="viewCurrentGame()">👁️ View Data</button>
    <button class="danger" onclick="deleteCurrentGame()">🗑️ Delete</button>
  </div>

  <div class="section">
    <h2>📜 Game History</h2>
    <div id="history"></div>
    <button onclick="viewHistory()">👁️ View Data</button>
    <button class="danger" onclick="clearHistory()">🗑️ Clear All</button>
  </div>

  <div class="section">
    <h2>📈 Statistics</h2>
    <div id="stats"></div>
    <button onclick="viewStats()">👁️ View Data</button>
    <button class="danger" onclick="clearStats()">🗑️ Reset</button>
  </div>

  <div class="section">
    <h2>⚙️ Settings</h2>
    <div id="settings"></div>
    <button onclick="viewSettings()">👁️ View Data</button>
  </div>

  <div class="section">
    <h2>🔧 Tools</h2>
    <button onclick="exportAll()">📦 Export All Data</button>
    <button class="danger" onclick="clearAll()">💣 Clear Everything</button>
    <button onclick="location.href='index.html'">🎮 Back to Game</button>
  </div>

  <script>
    const KEYS = {
      CURRENT: 'chess-game-current',
      HISTORY: 'chess-game-history',
      SETTINGS: 'chess-game-settings',
      STATS: 'chess-game-stats'
    };

    function checkStorage() {
      const status = document.getElementById('status');
      let html = '';

      // Check localStorage availability
      try {
        localStorage.setItem('test', 'test');
        localStorage.removeItem('test');
        html += '<div class="status success">✅ localStorage is available</div>';
      } catch (e) {
        html += '<div class="status error">❌ localStorage is NOT available: ' + e.message + '</div>';
      }

      // Check each key
      Object.keys(KEYS).forEach(key => {
        const storageKey = KEYS[key];
        const exists = localStorage.getItem(storageKey) !== null;
        const size = exists ? new Blob([localStorage.getItem(storageKey)]).size : 0;

        html += `<div class="status ${exists ? 'success' : 'info'}">
          ${exists ? '✅' : '⚠️'} ${key}: ${exists ? 'EXISTS (' + size + ' bytes)' : 'NOT FOUND'}
        </div>`;
      });

      // Total storage
      let total = 0;
      for (let key in localStorage) {
        if (localStorage.hasOwnProperty(key)) {
          total += localStorage[key].length + key.length;
        }
      }
      html += `<div class="status info">💾 Total Storage Used: ${(total / 1024).toFixed(2)} KB</div>`;

      status.innerHTML = html;
    }

    function viewCurrentGame() {
      const data = localStorage.getItem(KEYS.CURRENT);
      const container = document.getElementById('current-game');

      if (!data) {
        container.innerHTML = '<div class="status info">⚠️ No saved game found</div>';
        return;
      }

      try {
        const parsed = JSON.parse(data);
        container.innerHTML = `
          <div class="status success">✅ Saved game found!</div>
          <p><strong>Move Count:</strong> ${parsed.moveCount}</p>
          <p><strong>Timestamp:</strong> ${new Date(parsed.timestamp).toLocaleString()}</p>
          <p><strong>Status:</strong> ${parsed.gameStatus || 'N/A'}</p>
          <p><strong>FEN:</strong></p>
          <pre>${parsed.fen}</pre>
          <p><strong>Full Data:</strong></p>
          <pre>${JSON.stringify(parsed, null, 2)}</pre>
        `;
      } catch (e) {
        container.innerHTML = '<div class="status error">❌ Error parsing data: ' + e.message + '</div>';
      }
    }

    function deleteCurrentGame() {
      if (confirm('Delete current game save?')) {
        localStorage.removeItem(KEYS.CURRENT);
        alert('✅ Current game deleted');
        viewCurrentGame();
        checkStorage();
      }
    }

    function viewHistory() {
      const data = localStorage.getItem(KEYS.HISTORY);
      const container = document.getElementById('history');

      if (!data) {
        container.innerHTML = '<div class="status info">⚠️ No history found</div>';
        return;
      }

      try {
        const parsed = JSON.parse(data);
        container.innerHTML = `
          <div class="status success">✅ ${parsed.length} game(s) in history</div>
          <pre>${JSON.stringify(parsed, null, 2)}</pre>
        `;
      } catch (e) {
        container.innerHTML = '<div class="status error">❌ Error parsing data: ' + e.message + '</div>';
      }
    }

    function clearHistory() {
      if (confirm('Clear all game history?')) {
        localStorage.removeItem(KEYS.HISTORY);
        alert('✅ History cleared');
        viewHistory();
        checkStorage();
      }
    }

    function viewStats() {
      const data = localStorage.getItem(KEYS.STATS);
      const container = document.getElementById('stats');

      if (!data) {
        container.innerHTML = '<div class="status info">⚠️ No stats found</div>';
        return;
      }

      try {
        const parsed = JSON.parse(data);
        container.innerHTML = `
          <div class="status success">✅ Stats found</div>
          <p><strong>Games Played:</strong> ${parsed.gamesPlayed}</p>
          <p><strong>White Wins:</strong> ${parsed.whiteWins}</p>
          <p><strong>Black Wins:</strong> ${parsed.blackWins}</p>
          <p><strong>Draws:</strong> ${parsed.draws}</p>
          <pre>${JSON.stringify(parsed, null, 2)}</pre>
        `;
      } catch (e) {
        container.innerHTML = '<div class="status error">❌ Error parsing data: ' + e.message + '</div>';
      }
    }

    function clearStats() {
      if (confirm('Reset all statistics?')) {
        localStorage.removeItem(KEYS.STATS);
        alert('✅ Stats reset');
        viewStats();
        checkStorage();
      }
    }

    function viewSettings() {
      const data = localStorage.getItem(KEYS.SETTINGS);
      const container = document.getElementById('settings');

      if (!data) {
        container.innerHTML = '<div class="status info">⚠️ No settings found (using defaults)</div>';
        return;
      }

      try {
        const parsed = JSON.parse(data);
        container.innerHTML = `
          <div class="status success">✅ Settings found</div>
          <pre>${JSON.stringify(parsed, null, 2)}</pre>
        `;
      } catch (e) {
        container.innerHTML = '<div class="status error">❌ Error parsing data: ' + e.message + '</div>';
      }
    }

    function exportAll() {
      const data = {
        currentGame: localStorage.getItem(KEYS.CURRENT),
        history: localStorage.getItem(KEYS.HISTORY),
        stats: localStorage.getItem(KEYS.STATS),
        settings: localStorage.getItem(KEYS.SETTINGS),
        exportedAt: new Date().toISOString()
      };

      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `chess-game-backup-${Date.now()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      alert('✅ Data exported!');
    }

    function clearAll() {
      if (confirm('⚠️ DELETE EVERYTHING? This cannot be undone!')) {
        if (confirm('Are you REALLY sure? All game data will be lost!')) {
          Object.values(KEYS).forEach(key => localStorage.removeItem(key));
          alert('💣 Everything deleted!');
          location.reload();
        }
      }
    }

    // Auto-run on load
    checkStorage();
    viewCurrentGame();
  </script>
</body>
</html>
